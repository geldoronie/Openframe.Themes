# OpenFrame Wayfire user overrides (launcher substitutes @OPENFRAME_SESSION@ and merges with base if needed).
# [input] comes from Keyboard/Mouse settings (keyboardconfig, mouseconfig).

[core]
plugins = alpha animate autostart command cube decoration expo fast-switcher fisheye foreign-toplevel grid gtk-shell idle invert move oswitch place resize session-lock shortcuts-inhibit switcher vswitch window-rules wm-actions wrot zoom blur
vwidth = 2
vheight = 2
preferred_decoration_mode = client
close_top_view = <alt> KEY_F4

[input]
xkb_layout = us
xkb_variant = alt-intl
cursor_theme = Ubuntosh-Icons
cursor_size = 24
natural_scroll = 0
tap_to_click = 1

[animate]
open_animation = zoom
close_animation = zoom
duration = 300
enabled_for = type is toplevel
fire_duration = 300
fire_particles = 2000
fire_color = 227 151 31 255
fade_duration = 400
zoom_duration = 500

[move]
activate = <alt> BTN_LEFT
enable_snap = 1
snap_threshold = 10
enable_snap_off = 1
snap_off_threshold = 0

[resize]
activate = <alt> BTN_RIGHT

[switcher]
next_view = <alt> KEY_TAB
prev_view = <alt> <shift> KEY_TAB

[fast-switcher]
activate = <alt> KEY_ESC

[vswitch]
binding_left = <super> KEY_LEFT
binding_right = <super> KEY_RIGHT
binding_up = <super> KEY_UP
binding_down = <super> KEY_DOWN
with_win_left = <super> <shift> KEY_LEFT
with_win_right = <super> <shift> KEY_RIGHT
with_win_up = <super> <shift> KEY_UP
with_win_down = <super> <shift> KEY_DOWN
duration = 300

[wobbly]
friction = 3
spring_k = 8
grid_resolution = 6

[zoom]
modifier =  SUPER

[alpha]
modifier =  SUPER

[wrot]
activate = <alt> BTN_MIDDLE

[fisheye]
toggle = <super> KEY_F

[cube]
activate = <ctrl> <alt> BTN_MIDDLE
rotate_left = <super> <ctrl> KEY_LEFT
rotate_right = <super> <ctrl> KEY_RIGHT

[expo]
toggle = <super> KEY_E
select_workspace_1 = <super> KEY_1
select_workspace_2 = <super> KEY_2
select_workspace_3 = <super> KEY_3
select_workspace_4 = <super> KEY_4
select_workspace_5 = <super> KEY_5
select_workspace_6 = <super> KEY_6
select_workspace_7 = <super> KEY_7
select_workspace_8 = <super> KEY_8
select_workspace_9 = <super> KEY_9

[grid]
slot_bl =  KEY_KP_1
slot_b =  KEY_KP_2
slot_br =  KEY_KP_3
slot_l =  KEY_KP_4
slot_c =  KEY_KP_5
slot_r =  KEY_KP_6
slot_tl =  KEY_KP_7
slot_t =  KEY_KP_8
slot_tr =  KEY_KP_9
restore =  KEY_KP_0

[wm-actions]
toggle_fullscreen =  KEY_F11
toggle_always_on_top = <super> KEY_A
toggle_sticky = <super> KEY_S

[oswitch]
next_output = <super> KEY_O
next_output_with_win = <super> <shift> KEY_O

[invert]
toggle = <super> KEY_I

[place]
mode = center

[decoration]
active_color = 0.6 0.6 0.6 1.0
inactive_color = 0.3 0.3 0.3 1.0
font_color = #FFFFFFFF
border_size = 4
title_height = 30
button_order = minimize maximize close
font = sans-serif
ignore_views = none

[command]

[window-rules]
[idle]
toggle = <super> KEY_Z
screensaver_timeout = 300
dpms_timeout = 600

[autostart]
openframe = @OPENFRAME_SESSION@
